<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>${title}</title>
    <style>
        :root {
            --bg: #fafafa;
            --bg-accent: #ffffff;
            --card: #ffffff;
            --text: #171717;
            --muted: #737373;
            --line: #e5e5e5;
            --primary: #171717;
            --primary-strong: #000000;
            --danger: #dc2626;
            --warning: #d97706;
            --success-bg: #f0fdf4;
            --danger-bg: #fef2f2;
            --warning-bg: #fffbeb;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --radius: 8px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            line-height: 1.5;
        }
        a { color: inherit; }
        .page { max-width: 1240px; margin: 0 auto; padding: 32px 20px 40px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .brand {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .eyebrow {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        h1 { margin: 0; font-size: clamp(28px, 4vw, 36px); line-height: 1.1; font-weight: 700; }
        .subtitle { margin: 0; color: var(--muted); font-size: 15px; }
        .topbar-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #f4f4f5;
            color: var(--text);
            border: 1px solid var(--line);
            font-size: 13px;
            font-weight: 600;
        }
        .ghost-link,
        .ghost-button {
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 8px 12px;
            background: transparent;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .ghost-button:hover,
        .ghost-link:hover { background: #f5f5f5; border-color: var(--line); }
        .notice {
            margin-bottom: 18px;
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 14px;
        }
        .notice-success { background: var(--success-bg); border-color: #bbf7d0; color: #166534; }
        .notice-error { background: var(--danger-bg); border-color: #fecaca; color: var(--danger); }
        .notice-warning { background: var(--warning-bg); border-color: #fde68a; color: #92400e; }
        .grid { display: grid; gap: 20px; }
        .dashboard { grid-template-columns: 1.8fr 1fr; align-items: start; gap: 24px; }
        .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            padding: 24px;
        }
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .section-title h2,
        .section-title h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }
        .stat-label { color: var(--muted); font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
        .stat-footnote { color: var(--muted); font-size: 12px; margin-top: 10px; }
        form { margin: 0; }
        .form-grid { display: grid; gap: 16px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .form-grid.single { grid-template-columns: 1fr; }
        label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; font-weight: 500; }
        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
            transition: all 0.15s ease;
        }
        textarea { min-height: 100px; resize: vertical; }
        input:focus,
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
        .button-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        .primary-button,
        .secondary-button,
        .danger-button {
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 8px 16px;
            font: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .primary-button { background: var(--primary); color: #fff; }
        .secondary-button { background: #fff; border-color: var(--line); color: var(--text); }
        .danger-button { background: #fff; border-color: #fecaca; color: var(--danger); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .primary-button:hover { background: var(--primary-strong); }
        .secondary-button:hover { background: #fafafa; border-color: #d4d4d4; }
        .danger-button:hover { background: var(--danger-bg); border-color: var(--danger); }
        .stack { display: flex; flex-direction: column; gap: 16px; }
        .channel-list { display: flex; flex-direction: column; gap: 16px; }
        .channel-item {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px;
            background: #fff;
            transition: box-shadow 0.15s ease;
        }
        .channel-item:hover { box-shadow: var(--shadow); }
        .channel-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }
        .channel-meta { display: grid; gap: 12px; grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 16px; }
        .field-label { color: var(--muted); font-size: 12px; margin-bottom: 4px; font-weight: 500; }
        .field-value { font-size: 14px; line-height: 1.5; word-break: break-all; }
        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .pill-enabled { background: var(--success-bg); color: #166534; border-color: #bbf7d0; }
        .pill-disabled { background: var(--danger-bg); color: var(--danger); border-color: #fecaca; }
        .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
        .action-row form { display: inline-flex; }
        .code-box {
            margin-top: 16px;
            border-radius: 6px;
            padding: 12px 16px;
            background: #fafafa;
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .login-shell { max-width: 420px; margin: 10vh auto 0; }
        .login-shell .card { padding: 32px; }
        .helper-text { color: var(--muted); font-size: 13px; line-height: 1.6; }
        @media (max-width: 960px) {
            .dashboard,
            .stats,
            .form-grid,
            .channel-meta { grid-template-columns: 1fr; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .topbar-actions { justify-content: flex-start; }
            .page { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <p class="eyebrow">Response2Chat Console</p>
                <h1>${title}</h1>
                <p class="subtitle">多渠道路由、管理员登录和外部访问 key 统一配置。</p>
            </div>
            ${nav_html}
        </div>
        ${notice_html}
        ${content_html}
    </div>
</body>
</html>
