<div class="grid stats">
    <div class="card">
        <div class="stat-label">渠道总数</div>
        <div class="stat-value">${stats_total}</div>
        <div class="stat-footnote">所有已创建渠道</div>
    </div>
    <div class="card">
        <div class="stat-label">已启用</div>
        <div class="stat-value">${stats_enabled}</div>
        <div class="stat-footnote">可供外部调用的渠道</div>
    </div>
    <div class="card">
        <div class="stat-label">已停用</div>
        <div class="stat-value">${stats_disabled}</div>
        <div class="stat-footnote">保留配置但不接受调用</div>
    </div>
</div>
<div class="grid dashboard" style="margin-top: 24px;">
    <!-- 左侧主内容：渠道列表 -->
    <div class="stack" style="gap: 20px;">
        <div class="section-title" style="margin-bottom: 0;">
            <div>
                <h2>渠道列表</h2>
                <p class="muted">管理所有已配置的代理渠道，系统将根据访问 key 自动路由。</p>
            </div>
        </div>
        <div class="channel-list">
            ${channel_cards_html}
        </div>
    </div>

    <!-- 右侧边栏：操作与配置 -->
    <div class="stack">
        <div class="card stack">
            <div class="section-title">
                <div>
                    <h3>新增渠道</h3>
                    <p class="muted">保存后自动生成对外访问 key。</p>
                </div>
            </div>
            <form method="post" action="/admin/channels" class="stack">
                <label>
                    渠道名称
                    <input type="text" name="name" placeholder="例如：主账号 A" required />
                </label>
                <label>
                    上游 API URL
                    <input type="text" name="upstream_base_url" placeholder="https://api.openai.com/v1" required />
                </label>
                <label>
                    上游 API Key
                    <input type="text" name="upstream_api_key" placeholder="sk-... (可选)" />
                </label>
                <label>
                    描述
                    <textarea name="description" placeholder="可选，用途备注" style="min-height: 80px;"></textarea>
                </label>
                <div class="button-row" style="margin-top: 8px;">
                    <button class="primary-button" type="submit" style="width: 100%;">创建渠道</button>
                </div>
            </form>
        </div>
        <div class="card stack">
            <div class="section-title">
                <div>
                    <h3>调用规则</h3>
                    <p class="muted">自动替换 URL 和 Key</p>
                </div>
            </div>
            <div class="helper-text">原生兼容 /v1/chat/completions。<br/><br/>区别只在于 Authorization 放置系统分配的**渠道访问 key**，代理会平滑转发至上游。</div>
        </div>
        <div class="card stack">
            <div class="section-title">
                <div>
                    <h3>管理员安全</h3>
                    <p class="muted">修改控制台登录密码</p>
                </div>
            </div>
            <form method="post" action="/admin/change-password" class="stack">
                <label>
                    当前密码
                    <input type="password" name="current_password" autocomplete="current-password" required />
                </label>
                <div class="form-grid">
                    <label>
                        新密码
                        <input type="password" name="new_password" autocomplete="new-password" minlength="8" required />
                    </label>
                    <label>
                        确认新密码
                        <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required />
                    </label>
                </div>
                <div class="button-row" style="margin-top: 8px;">
                    <button class="secondary-button" type="submit" style="width: 100%;">更新密码</button>
                </div>
            </form>
        </div>
    </div>
</div>
